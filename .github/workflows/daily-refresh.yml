name: Daily NaPTAN refresh

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}     # allow manual run

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install duckdb
      - name: Refresh from the live NaPTAN dataset
        run: python3 refresh.py
      - name: Commit refreshed data (auto-deploys if Vercel git integration is on)
        run: |
          git config user.name "naptan-refresh-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "chore: daily NaPTAN refresh ($(date -u +%F))" || echo "no changes"
          git push
